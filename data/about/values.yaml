- title: "Build It Small, Build It Right"
  description: "We'd rather do one job extremely well than ten jobs adequately. Every product we build stays focused on the single problem it exists to solve, instead of sprawling into a platform nobody asked for."
  icon: "target"
  color: "cyan"
- title: "Privacy Isn't a Setting"
  description: "We default to collecting less, not more. If data doesn't need to leave a device or get stored at all, it doesn't — privacy isn't a checkbox we add later, it's a constraint we design around from day one."
  icon: "lock"
  color: "pink"
- title: "Ship It, Then Listen"
  description: "We'd rather put something real in front of users early and adjust based on how they actually use it than spend months polishing a feature nobody asked for."
  icon: "send"
  color: "purple"
- title: "Open Where It Counts"
  description: "Where it makes sense, we build in the open — sharing sources, crediting work that isn't ours, and inviting contributions instead of guarding everything behind a roadmap meeting."
  icon: "github"
  color: "blue"
