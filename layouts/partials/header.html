<header class="sticky top-0 z-50 border-b border-neon-cyan/30 bg-black/90 backdrop-blur-sm">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
    <a href="{{ "/" | relURL }}" class="block h-10 w-auto [&>svg]:h-full [&>svg]:w-auto" aria-label="{{ .Site.Title }}">
      {{ partial "brand-logo.html" . }}
    </a>

    <nav class="hidden items-center gap-8 font-mono text-sm uppercase tracking-wide md:flex">
      {{ partial "nav-links.html" (dict "ctx" . "mobile" false) }}
    </nav>

    <button type="button" id="nav-toggle" class="flex h-9 w-9 items-center justify-center text-neon-cyan md:hidden" aria-expanded="false" aria-controls="mobile-nav" aria-label="Toggle navigation menu">
      <span class="h-5 w-5" data-icon-open>{{ partial "icon.html" "menu" }}</span>
      <span class="hidden h-5 w-5" data-icon-close>{{ partial "icon.html" "close" }}</span>
    </button>
  </div>

  <nav id="mobile-nav" class="hidden border-t border-neon-cyan/20 px-6 py-2 font-mono text-sm uppercase tracking-wide md:hidden">
    {{ partial "nav-links.html" (dict "ctx" . "mobile" true) }}
  </nav>
</header>
