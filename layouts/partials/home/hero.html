<section class="grid-crosshair grid-backdrop relative flex min-h-screen items-center overflow-hidden px-6 py-24 text-center">
  <div class="animate-pulse-glow pointer-events-none absolute left-1/4 top-1/3 -z-10 h-72 w-72 rounded-full bg-neon-cyan/20"></div>
  <div class="animate-pulse-glow pointer-events-none absolute right-1/4 top-1/2 -z-10 h-72 w-72 rounded-full bg-neon-pink/20" style="animation-delay: 2s"></div>
  <div class="relative mx-auto max-w-4xl">
    <h1 class="font-display text-5xl font-extrabold leading-tight sm:text-6xl">
      <span class="text-glow-cyan text-neon-cyan">{{ .Site.Params.heroTitleLine1 }}</span><br>
      <span class="text-glow-pink text-neon-pink">{{ .Site.Params.heroTitleLine2 }}</span>
    </h1>

    <p class="mx-auto mt-6 max-w-2xl font-mono text-gray-300">
      {{ .Site.Params.heroSubtitle }}
    </p>

    <div class="mt-8 flex flex-wrap items-center justify-center gap-4">
      <a href="{{ "/about/" | relURL }}" class="border-glow-cyan inline-flex items-center gap-2 rounded border border-neon-cyan px-6 py-3 font-mono text-sm uppercase text-neon-cyan transition-colors hover:bg-neon-cyan/10">
        About Zero String
        <span class="h-4 w-4">{{ partial "icon.html" "arrow-right" }}</span>
      </a>
      <a href="{{ "/projects/" | relURL }}" class="border-glow-purple inline-flex items-center gap-2 rounded border border-neon-purple px-6 py-3 font-mono text-sm uppercase text-neon-purple transition-colors hover:bg-neon-purple/10">
        View Projects
      </a>
    </div>
  </div>
</section>
