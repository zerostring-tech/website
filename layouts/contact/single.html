{{ define "main" }}
<section class="px-6 py-20">
  <div class="mx-auto max-w-3xl text-center">
    <h1 class="font-display text-4xl font-extrabold text-white sm:text-5xl">
      {{ .Params.heroLine1 }} <span class="text-neon-cyan text-glow-cyan">{{ .Params.heroHighlight }}</span>
    </h1>
    <p class="mx-auto mt-6 font-mono text-gray-300">{{ .Params.heroLead }}</p>
  </div>

  <div class="mx-auto mt-14 max-w-xl">
    <div class="card-surface rounded-xl border border-amber-500/40 p-8 text-center">
      <h2 class="font-display text-2xl font-bold text-neon-pink text-glow-pink">Get in Touch</h2>
      <p class="mt-3 font-mono text-sm text-gray-400">The fastest way to reach us.</p>

      {{ range .Site.Data.contact }}
        <a href="mailto:{{ .value }}" class="border-glow-cyan mt-6 inline-flex items-center gap-2 rounded border border-neon-cyan px-6 py-3 font-mono text-base text-neon-cyan transition-colors hover:bg-neon-cyan/10">
          <span class="h-5 w-5">{{ partial "icon.html" .icon }}</span>
          {{ .value }}
        </a>
      {{ end }}
    </div>

    <div class="card-surface mt-8 rounded-xl border border-amber-500/40 p-8 text-center">
      <h2 class="font-display text-xl font-bold text-neon-purple text-glow-purple">{{ .Params.responseHeading }}</h2>
      <p class="mt-4 font-mono text-sm text-gray-300">{{ .Params.responseLead }}</p>
    </div>
  </div>
</section>
{{ end }}
