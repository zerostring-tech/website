{{ define "main" }}
<article class="grid-backdrop relative overflow-hidden px-6 py-20">
  <div class="relative mx-auto max-w-3xl">
    <p class="font-mono text-xs uppercase tracking-wide text-gray-500">{{ .Date.Format "January 2, 2006" }}</p>
    <h1 class="mt-2 font-display text-4xl font-bold text-neon-cyan text-glow-cyan sm:text-5xl">{{ .Title }}</h1>
    <div class="prose-invert mt-10 max-w-none font-mono text-gray-300 [&_a]:text-neon-cyan [&_h2]:font-display [&_h2]:text-neon-purple [&_h2]:text-glow-purple [&_h2]:mt-10 [&_h2]:text-2xl [&_p]:mt-4 [&_strong]:text-white [&_ul]:mt-4 [&_ul]:list-disc [&_ul]:pl-5">
      {{ .Content }}
    </div>
    <a href="{{ "/blog/" | relURL }}" class="mt-12 inline-flex items-center gap-2 font-mono text-sm uppercase text-neon-cyan hover:text-glow-cyan">&larr; Back to blog</a>
  </div>
</article>
{{ end }}
