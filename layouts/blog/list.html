{{ define "main" }}
<section class="grid-backdrop relative overflow-hidden px-6 py-20 text-center">
  <div class="relative mx-auto max-w-3xl">
    <h1 class="font-display text-4xl font-bold text-neon-cyan text-glow-cyan sm:text-5xl">{{ .Title }}</h1>
    {{ with .Params.subtitle }}
      <p class="mt-4 font-mono text-gray-300">{{ . }}</p>
    {{ end }}
  </div>

  <div class="relative mx-auto mt-14 grid max-w-5xl gap-6 text-left sm:grid-cols-2">
    {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="card-surface block rounded-lg border border-neon-purple/50 p-6 transition-shadow hover:shadow-[0_0_16px_rgba(181,83,242,0.35)]">
        <p class="font-mono text-xs uppercase tracking-wide text-gray-500">{{ .Date.Format "January 2, 2006" }}</p>
        <h2 class="mt-2 font-display text-lg font-bold text-neon-purple text-glow-purple">{{ .Title }}</h2>
        <p class="mt-3 font-mono text-sm text-gray-300">{{ .Summary }}</p>
      </a>
    {{ end }}
  </div>
</section>
{{ end }}
