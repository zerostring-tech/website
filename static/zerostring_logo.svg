<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <defs>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Zero symbol -->
  <g filter="url(#neonGlow)">
    <circle cx="30" cy="40" r="22" fill="none" stroke="#00ffff" stroke-width="4"/>
    <circle cx="30" cy="40" r="12" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- String representation with 4 connected nodes -->
  <g transform="translate(70, 40)" filter="url(#neonGlow)">
    <!-- 4 connection nodes -->
    <circle cx="0" cy="0" r="3" fill="#00ffff"/>
    <circle cx="30" cy="0" r="3" fill="#ff006e"/>
    <circle cx="60" cy="0" r="3" fill="#00ffff"/>
    <circle cx="90" cy="0" r="3" fill="#ff006e"/>

    <!-- Data flow indicators -->
    <circle cx="90" cy="0" r="1.5" fill="#b553f2" opacity="0.9">
      <animate attributeName="cx" values="90;0;90" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="0" r="1.5" fill="#b553f2" opacity="0.9">
      <animate attributeName="cx" values="90;0;90" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Company name - Two lines -->
  <text x="180" y="36" font-family="Orbitron, sans-serif" font-size="28" font-weight="700" fill="#00ffff" filter="url(#neonGlow)">
    Zero
  </text>
  <text x="180" y="58" font-family="Orbitron, sans-serif" font-size="28" font-weight="700" fill="#ff006e" filter="url(#neonGlow)">
    String
  </text>
</svg>
